name: Job Scraper

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: scraper-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/scraper_deploy_key
          chmod 600 ~/.ssh/scraper_deploy_key

      - name: Trust server host key
        shell: bash
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 60
          retry_wait_seconds: 30
          command: |
            ssh \
              -i ~/.ssh/scraper_deploy_key \
              -p "${{ secrets.VPS_PORT }}" \
              -o BatchMode=yes \
              -o ConnectTimeout=60 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=6 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'set -e
              cd /var/www/scraper
              git fetch origin main
              git reset --hard origin/main
              docker compose up -d --build
              docker compose exec -T dashboard npm run db:migrate
              docker compose ps'
