services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: job_aggregator
      MYSQL_USER: job_user
      MYSQL_PASSWORD: job_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u job_user --password=job_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    env_file: .env
    environment:
      DATABASE_URL: mysql://job_user:job_password@mysql:3306/job_aggregator
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: mysql://job_user:job_password@mysql:3306/job_aggregator
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
