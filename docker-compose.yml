services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: mysql://${DB_USERNAME}:${DB_PASSWORD}@host.docker.internal:3306/${DB_DATABASE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3010:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: mysql://${DB_USERNAME}:${DB_PASSWORD}@host.docker.internal:3306/${DB_DATABASE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
